<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grifols Donor Data Journey Dashboard</title>
    <link rel="stylesheet" href="./src/styles.css">
    <link rel="icon" href="./Grifols-logo.png" type="image/png">
    <meta name="theme-color" content="#ffffff">
    <link rel="manifest" href="./manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <img src="./Grifols-logo.png" alt="Grifols Logo" class="logo">
            <h1>Donor Data Journey Dashboard</h1>
        </header>

        <div class="region-buttons">
            <button class="region-btn active" data-region="USA">USA</button>
            <button class="region-btn" data-region="EU">EU</button>
            <button class="region-btn" data-region="Egypt">Egypt</button>
            <button class="region-btn" data-region="Biosupplies">Biosupplies</button>
        </div>

        <div class="canvas-container">
            <canvas id="journeyCanvas" width="1200" height="800"></canvas>
        </div>

        <div class="controls">
            <button id="zoomIn">+</button>
            <button id="zoomOut">-</button>
            <button id="resetView">Reset</button>
            <button id="editMode">Edit Mode</button>
        </div>

        <div id="observations-panel" class="observations-panel">
            <h3>Observations</h3>
            <div id="observations-content"></div>
        </div>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>
</html>
